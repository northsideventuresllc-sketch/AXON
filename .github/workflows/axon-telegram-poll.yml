name: AXON Telegram Poll

on:
  schedule:
    # Fallback poll when webhook is not registered (GitHub cron is best-effort, not every 2 min)
    - cron: '*/15 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [axon-telegram-poll]

concurrency:
  group: axon-telegram-poll
  cancel-in-progress: false

jobs:
  poll:
    name: AXON — Telegram chat + approve
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Poll Telegram commands
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          AXON_WEBHOOK_URL: ${{ secrets.AXON_WEBHOOK_URL }}
        run: node scripts/axon-telegram-poll.mjs
