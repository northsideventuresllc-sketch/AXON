name: AXON Content Batch Notify

# 2026-07-14: Schedule paused — Match Fit content must not hit AXON Telegram.
# Re-enable schedule only after NI content calendar (AX-NI-CAL) owns NI batches
# AND CONTENT_MACHINE_ALLOW_MATCH_FIT is an explicit JB choice for MF.
on:
  workflow_dispatch:
    inputs:
      allow_match_fit:
        description: 'Also notify Match Fit pending drafts (default off)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: axon-content-batch-notify
  cancel-in-progress: false

jobs:
  notify:
    name: AXON — Content Machine Telegram batch preview (MF gated)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Notify pending content batches
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          AXON_CM6_ALLOW_MATCH_FIT: ${{ inputs.allow_match_fit == 'true' && '1' || '0' }}
        run: node scripts/axon-content-batch-notify.mjs

      - name: Report failure
        if: failure()
        run: echo "AXON content batch notify failed — check Actions logs"
