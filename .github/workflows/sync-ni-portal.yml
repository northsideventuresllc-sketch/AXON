name: Sync AXON UI to NI Portal

# Pushes embedded portal UI into northside-intelligence when AXON web UI changes.
# Requires NI_GITHUB_PAT secret on this repo (fine-grained PAT, contents:write on NI repo).

on:
  push:
    branches: [main]
    paths:
      - 'components/axon/**'
      - 'lib/axon*.ts'
      - 'lib/axon-*.ts'
      - 'lib/types.ts'
      - 'lib/it-quick-links.ts'
      - 'lib/outreach-edit.ts'
      - 'lib/outreach-reject.ts'
      - 'lib/outreach-reject-core.mjs'
      - 'lib/outreach-learn.ts'
      - 'lib/outreach-learn-core.mjs'
      - 'lib/outreach-run.ts'
      - 'lib/outreach-run-core.mjs'
      - 'lib/icp-config.mjs'
      - 'lib/constants.mjs'
      - 'app/api/axon/outreach/**'
      - 'lib/axon-quick-links.ts'
      - 'lib/use-axon-quick-links.ts'
      - 'lib/leads.ts'
      - 'app/api/leads/**'
      - 'lib/use-axon-voice.ts'
      - 'app/globals.css'
      - 'portal-integration/**'
      - 'scripts/sync-portal-ui.mjs'
  workflow_dispatch:

concurrency:
  group: sync-ni-portal
  cancel-in-progress: false

jobs:
  sync:
    name: Sync → northside-intelligence
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout AXON
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone NI portal repo
        env:
          NI_GITHUB_PAT: ${{ secrets.NI_GITHUB_PAT }}
        run: |
          if [ -z "$NI_GITHUB_PAT" ]; then
            echo "::error::NI_GITHUB_PAT secret is not set on this repo."
            echo "See docs/cursor-github-access.md"
            exit 1
          fi
          git clone --depth 1 \
            "https://x-access-token:${NI_GITHUB_PAT}@github.com/northsideventuresllc-sketch/northside-intelligence.git" \
            ni-portal

      - name: Run portal sync script
        run: node scripts/sync-portal-ui.mjs ./ni-portal

      - name: Commit and push to NI main
        env:
          NI_GITHUB_PAT: ${{ secrets.NI_GITHUB_PAT }}
        working-directory: ni-portal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No portal changes to push."
            exit 0
          fi
          git commit -m "chore(axon): sync embedded UI from AXON repo

          Automated by northsideventuresllc-sketch/AXON sync-ni-portal workflow."
          git push \
            "https://x-access-token:${NI_GITHUB_PAT}@github.com/northsideventuresllc-sketch/northside-intelligence.git" \
            HEAD:main
