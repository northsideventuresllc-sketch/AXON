name: AXON NI Outreach

on:
  # AUTO DISABLED 2026-07-09 — JB training mode until 3 validated manual leads.
  # Re-enable schedule only after ICP locked + JB approval.
  # schedule:
  #   - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      manual_run:
        description: 'Set true to run (training mode — auto cron off)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      max:
        description: Max drafts this run (default 3 for training)
        required: false
        default: '3'
        type: string

concurrency:
  group: axon-ni-outreach
  cancel-in-progress: false

jobs:
  outreach:
    name: AXON — find · score · draft · queue
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run outreach engine
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_BACKUP: ${{ secrets.GEMINI_API_KEY_BACKUP }}
          SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          AXON_GEMINI_DELAY_MS: '2500'
          AXON_OUTREACH_MANUAL_RUN: ${{ github.event.inputs.manual_run || 'true' }}
          AXON_OUTREACH_MAX: ${{ github.event.inputs.max || '3' }}
        run: node scripts/axon-ni-outreach.mjs

      - name: Report failure
        if: failure()
        run: echo "❌ AXON outreach failed — check Actions logs"
