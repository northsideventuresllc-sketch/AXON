name: AXON Telegram Setup

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Setup mode'
        required: true
        default: 'webhook'
        type: choice
        options:
          - commands
          - webhook
          - auto
          - polling
      webhook_url:
        description: 'Webhook URL (webhook/auto mode; default = AXON Vercel deployment)'
        required: false
        type: string

jobs:
  setup:
    name: AXON — Register Telegram commands / webhook
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Register slash commands
        if: inputs.mode == 'commands'
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/axon-telegram-setup.mjs

      - name: Set webhook (real-time chat)
        if: inputs.mode == 'webhook'
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AXON_WEBHOOK_URL: ${{ inputs.webhook_url || secrets.AXON_WEBHOOK_URL }}
        run: |
          if [ -n "$AXON_WEBHOOK_URL" ]; then
            node scripts/axon-telegram-setup.mjs --webhook "$AXON_WEBHOOK_URL"
          else
            node scripts/axon-telegram-setup.mjs --auto
          fi

      - name: Auto webhook (default Vercel URL)
        if: inputs.mode == 'auto'
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AXON_WEBHOOK_URL: ${{ secrets.AXON_WEBHOOK_URL }}
        run: node scripts/axon-telegram-setup.mjs --auto

      - name: Switch to polling mode
        if: inputs.mode == 'polling'
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: node scripts/axon-telegram-setup.mjs --polling
